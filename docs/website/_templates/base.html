{% extends "!base.html" %}

{#
  Add comprehensive favicon and PWA links to the <head> for cross-browser support.
  Assets are copied into _static/ via html_static_path from docs/favicon/.
#}

{% block extrahead %}
  {{ super() }}
  <link rel="icon" href="{{ pathto('_static/favicon.ico', 1) }}" sizes="any">
  <link rel="icon" type="image/svg+xml" href="{{ pathto('_static/favicon.svg', 1) }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ pathto('_static/apple-touch-icon.png', 1) }}">
  <link rel="icon" type="image/png" sizes="96x96" href="{{ pathto('_static/favicon-96x96.png', 1) }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ pathto('_static/web-app-manifest-192x192.png', 1) }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ pathto('_static/web-app-manifest-512x512.png', 1) }}">
  <link rel="manifest" href="{{ pathto('_static/site.webmanifest', 1) }}">
{% endblock %}
