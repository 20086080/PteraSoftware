name: isort

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: isort/isort-action@24d8a7a51d33ca7f36c3f23598dafa33f7071326 # v1
