name: isort

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: isort/isort-action@24d8a7a51d33ca7f36c3f23598dafa33f7071326 # v1
