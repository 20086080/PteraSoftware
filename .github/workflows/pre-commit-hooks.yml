name: pre-commit-hooks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit-hooks:
    name: ${{ matrix.hook }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hook:
          - end-of-file-fixer
          - trailing-whitespace
          - mixed-line-ending
          - check-merge-conflict
          - check-case-conflict
          - check-illegal-windows-names
          - check-symlinks
          - destroyed-symlinks
          - check-yaml
          - check-toml
          - check-xml
          - check-json
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Run ${{ matrix.hook }} hook
        run: pre-commit run --all-files ${{ matrix.hook }}
