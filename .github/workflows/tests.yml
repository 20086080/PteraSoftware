name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        dependency-set: ["min", "latest"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements_min.txt
      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@9c1c7435d9635423c90d2c37489588c81673274a # v3
      - name: Install minimum dependencies
        if: ${{ matrix.dependency-set == 'min' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_min.txt
      - name: Install latest dependencies
        if: ${{ matrix.dependency-set == 'latest' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Codecov
        if: ${{ matrix.python-version == '3.13' && matrix.dependency-set == 'latest' }}
        run: |
          pip install codecov
      - name: Run tests without coverage
        if: ${{ !(matrix.python-version == '3.13' && matrix.dependency-set == 'latest') }}
        run: |
          python -m unittest discover -s tests
      - name: Run tests with coverage and generate coverage report
        if: ${{ matrix.python-version == '3.13' && matrix.dependency-set == 'latest' }}
        env:
          NUMBA_JIT_COVERAGE: "1"
        run: |
          coverage run --source=pterasoftware -m unittest discover -s tests
          coverage xml -o coverage.xml
      - name: Upload coverage report to Codecov
        if: ${{ matrix.python-version == '3.13' && matrix.dependency-set == 'latest' }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
