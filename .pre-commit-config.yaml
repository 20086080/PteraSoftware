repos:
  # Fixers: normalize bytes first so later hooks see clean files.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
  # Auto-formatters: rewrite code on top of the normalized bytes.
  - repo: https://github.com/pycqa/isort
    rev: 9.0.0a3
    hooks:
      - id: isort
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.8
    hooks:
      - id: docformatter
        additional_dependencies: [tomli]
        args: [--in-place, --config, ./pyproject.toml]
        files: ^pterasoftware/
  # Validators: read-only, run against the final state.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: check-json
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
  - repo: local
    hooks:
      - id: ascii-only
        name: ascii-only
        entry: python scripts/check_ascii_only.py
        language: system
        types: [text]
        exclude: '\.ui$'
      - id: mypy
        name: mypy
        entry: mypy pterasoftware
        language: system
        always_run: true
        pass_filenames: false
